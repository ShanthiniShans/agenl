name: AGENL CI

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install -e . && pip install pytest
      - name: Run tests
        run: pytest tests/ -v

  lean:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install elan
        run: |
          curl https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh \
            -sSf | sh -s -- --default-toolchain leanprover/lean4:v4.14.0 -y
          echo "$HOME/.elan/bin" >> $GITHUB_PATH
      - name: Cache Mathlib
        uses: actions/cache@v4
        with:
          path: |
            ~/.elan
            .lake/packages
            .lake/build
          key: ${{ runner.os }}-lean-${{ hashFiles('lakefile.lean', 'lakefile.toml', 'lean-toolchain') }}
          restore-keys: |
            ${{ runner.os }}-lean-
      - name: Build Lean proofs
        run: lake build
