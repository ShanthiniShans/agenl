name: AGENL CI

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          pip install flask lark anthropic
          pip install rich click pytest pydantic python-dotenv
          pip install -e .
      - name: Run tests
        run: pytest tests/ -v

  lean:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check Lean files exist
        run: |
          ls agenl/*.lean
          ls proofs/orbital/*.lean
          echo "All Lean proof files present"
