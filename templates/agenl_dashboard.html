<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AGENL — Agent Definition Language</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body { background: #08090f; color: #e8eaf6; font-family: 'Space Grotesk', sans-serif; }
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: #0d0f1a; }
::-webkit-scrollbar-thumb { background: #252844; border-radius: 3px; }
select option { background: #111422; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }
@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
@keyframes glowPulse { 0%, 100% { box-shadow: 0 0 6px #22c55e; } 50% { box-shadow: 0 0 14px #22c55e, 0 0 20px #22c55e55; } }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

// ── Colours ───────────────────────────────────────────────────────────────────
const C = {
  bg: '#08090f', s1: '#0d0f1a', s2: '#111422', s3: '#171b2e',
  border: '#1d2138', border2: '#252844',
  text: '#e8eaf6', textSec: '#7b82b4', textMut: '#454a72',
  green: '#22c55e', red: '#f43f5e', amber: '#f59e0b',
  blue: '#6366f1', cyan: '#22d3ee', purple: '#a78bfa',
};

// ── Nav ───────────────────────────────────────────────────────────────────────
const NAV = [
  { id: 'contracts',    icon: '▣', label: 'Agent Contracts' },
  { id: 'define',       icon: '+', label: 'Define Agent' },
  { id: 'verification', icon: '✓', label: 'Verification' },
  { id: 'trace',        icon: '⋮', label: 'Execution Trace' },
  { id: 'infoflow',     icon: '→', label: 'Info Flow' },
  { id: 'safetylog',    icon: '▦', label: 'Safety Log' },
  { id: 'proofs',       icon: '∀', label: 'Proofs' },
];

// ── Agent contract data ───────────────────────────────────────────────────────
const CONTRACTS = [
  { id: 1,  name: 'DataIngestionAgent',    layer: 1, trust: 'Low',    allow: ['read_mission_payload','parse_json','validate_schema'],              block: ['write_db','send_email','execute_command'],                     confirm: [],                   verified: true,  goal: 'Ingest and validate raw mission input data.',                                          persona: 'Data validator. Never assumes data is correct.',               onUncertain: 'say_so',    onError: 'stop',     memory: { short: 'session', long: 'none' } },
  { id: 2,  name: 'ScheduleAnalyser',      layer: 1, trust: 'Medium', allow: ['read_milestone_data','compute_schedule_risk','write_risk_report'],  block: ['modify_schedule','send_email','escalate_without_review'],      confirm: ['write_risk_report'], verified: true,  goal: 'Analyse program schedule milestones and compute delay risk.',                          persona: 'Methodical scheduler. Flags risk conservatively.',             onUncertain: 'escalate',  onError: 'escalate', memory: { short: 'session', long: 'mission_history' } },
  { id: 3,  name: 'WeatherMonitor',        layer: 1, trust: 'Low',    allow: ['read_weather_data','compute_launch_weather_risk'],                  block: ['modify_launch_window','issue_weather_warning_public'],         confirm: [],                   verified: true,  goal: 'Monitor weather data and assess launch window risk.',                                  persona: 'Conservative. Never clears weather without data.',             onUncertain: 'say_so',    onError: 'stop',     memory: { short: 'session', long: 'none' } },
  { id: 4,  name: 'OrbitalMechanicsAgent', layer: 1, trust: 'High',   allow: ['read_tle_data','compute_conjunction','flag_collision_risk','recommend_maneuver'], block: ['command_maneuver','issue_launch_authorisation'], confirm: ['flag_collision_risk'], verified: true, goal: 'Compute orbital conjunction risk and flag maneuver recommendations.', persona: 'Precise. Treats every conjunction as potentially critical.', onUncertain: 'escalate', onError: 'stop', memory: { short: 'session', long: 'orbital_history' } },
  { id: 5,  name: 'SubsystemHealthAgent',  layer: 2, trust: 'Medium', allow: ['read_telemetry','compute_health_score','write_health_report'],      block: ['modify_system_config','issue_commands'],                       confirm: [],                   verified: true,  goal: 'Assess subsystem health and identify degradation patterns.',                           persona: 'Thorough. Reports all anomalies regardless of severity.',      onUncertain: 'say_so',    onError: 'escalate', memory: { short: 'session', long: 'telemetry_log' } },
  { id: 6,  name: 'SubsystemRelationships',layer: 2, trust: 'Medium', allow: ['read_health_matrix','compute_cascade','send_feedback_signal'],      block: ['trigger_shutdown','modify_system_config'],                     confirm: ['send_feedback_signal'], verified: true, goal: 'Analyse cross-subsystem dependencies and cascade paths.',       persona: 'Systems thinker. Maps second-order effects.',                  onUncertain: 'say_so',    onError: 'stop',     memory: { short: 'session', long: 'none' } },
  { id: 7,  name: 'VendorRiskAgent',       layer: 2, trust: 'Low',    allow: ['read_vendor_data','compute_delay_risk','write_vendor_report'],      block: ['contact_vendor','modify_contract','approve_payment'],          confirm: [],                   verified: true,  goal: 'Assess vendor delay risk and downstream dependency impact.',                           persona: 'Risk-averse. Assumes worst-case delay propagation.',           onUncertain: 'say_so',    onError: 'stop',     memory: { short: 'session', long: 'vendor_history' } },
  { id: 8,  name: 'LaunchWindowAgent',     layer: 2, trust: 'High',   allow: ['read_launch_constraints','compute_window','write_window_report'],   block: ['approve_launch_window','command_hold'],                        confirm: ['write_window_report'], verified: true, goal: 'Determine launch window viability from all constraint inputs.', persona: 'Systematic. Checks every constraint before output.',           onUncertain: 'escalate',  onError: 'escalate', memory: { short: 'session', long: 'window_history' } },
  { id: 9,  name: 'RiskAggregatorAgent',   layer: 3, trust: 'High',   allow: ['read_all_reports','compute_aggregate_risk','write_risk_summary'],   block: ['approve_mission','issue_go_nogo'],                             confirm: ['write_risk_summary'], verified: true, goal: 'Aggregate risk signals from all agents into unified risk picture.', persona: 'Holistic. Weights all inputs before scoring.',                onUncertain: 'escalate',  onError: 'stop',     memory: { short: 'session', long: 'risk_history' } },
  { id: 10, name: 'EscalationRouterAgent', layer: 3, trust: 'Medium', allow: ['read_risk_summary','route_escalation','write_escalation_log'],      block: ['auto_approve_launch','close_escalation','resolve_autonomously'], confirm: ['route_escalation'], verified: true, goal: 'Route escalations to the correct human authority.',              persona: 'Procedural. Routes everything; decides nothing.',              onUncertain: 'escalate',  onError: 'escalate', memory: { short: 'session', long: 'escalation_log' } },
  { id: 11, name: 'LaunchReadinessAgent',  layer: 3, trust: 'High',   allow: ['read_all_reports','compute_readiness_score','write_readiness_report'], block: ['issue_launch_authorisation','command_ignition'],            confirm: ['write_readiness_report'], verified: true, goal: 'Produce a comprehensive launch readiness assessment for human review.', persona: 'Conservative. A NO-GO finding requires explicit human override.', onUncertain: 'escalate', onError: 'stop', memory: { short: 'session', long: 'readiness_history' } },
  { id: 12, name: 'ExecutiveReportAgent',  layer: 3, trust: 'Low',    allow: ['read_risk_summary','write_executive_report','label_as_public'],     block: ['write_classified_data','send_report_externally'],             confirm: [],                   verified: true,  goal: 'Generate a Public-labelled executive summary of mission risk.',                        persona: 'Clear communicator. Writes for non-technical audiences.',      onUncertain: 'say_so',    onError: 'stop',     memory: { short: 'session', long: 'none' } },
];

// ── Theorem data ──────────────────────────────────────────────────────────────
const THEOREMS = [
  { id: 1,  name: 'action_allowed_if_in_allowlist',     desc: 'An agent may only perform an action if it appears in its explicit allow list.',                            lean: 'theorem action_allowed_if_in_allowlist (a : Agent) (act : Action) :\n  canPerform a act ↔ act ∈ a.contract.allow_list',                                                                               file: 'Theorems/ActionSafety.lean',    jobs: 312 },
  { id: 2,  name: 'blocked_action_impossible',          desc: 'A blocked action cannot be executed by any agent, regardless of trust level.',                            lean: 'theorem blocked_action_impossible (a : Agent) (act : Action) :\n  act ∈ a.contract.block_list → ¬ canPerform a act',                                                                                   file: 'Theorems/ActionSafety.lean',    jobs: 208 },
  { id: 3,  name: 'secret_cannot_flow_to_public',       desc: 'Data labelled Secret can never flow to a Public destination.',                                            lean: 'theorem secret_cannot_flow_to_public :\n  ¬ canFlowTo Secret Public',                                                                                                                                   file: 'Theorems/InfoFlow.lean',        jobs: 187 },
  { id: 4,  name: 'canFlowTo_reflexive',                desc: 'Any data label can flow to itself.',                                                                      lean: 'theorem canFlowTo_reflexive (l : DataLabel) : canFlowTo l l',                                                                                                                                         file: 'Theorems/InfoFlow.lean',        jobs: 44  },
  { id: 5,  name: 'canFlowTo_transitive',               desc: 'Information flow is transitive across the label lattice.',                                                lean: 'theorem canFlowTo_transitive (a b c : DataLabel) :\n  canFlowTo a b → canFlowTo b c → canFlowTo a c',                                                                                               file: 'Theorems/InfoFlow.lean',        jobs: 96  },
  { id: 6,  name: 'internal_cannot_flow_to_public',     desc: 'Internal data cannot flow to a Public destination.',                                                      lean: 'theorem internal_cannot_flow_to_public :\n  ¬ canFlowTo Internal Public',                                                                                                                               file: 'Theorems/InfoFlow.lean',        jobs: 143 },
  { id: 7,  name: 'taint_propagation_monotone',         desc: 'Taint labels can only increase in rank through a computation pipeline.',                                  lean: 'theorem taint_propagation_monotone (d : LabelledData) :\n  ∀ step, (step d).label.rank ≥ d.label.rank',                                                                                             file: 'Theorems/Taint.lean',           jobs: 220 },
  { id: 8,  name: 'feedback_loop_terminates',           desc: 'Any feedback signal between agents terminates after one pass.',                                           lean: 'theorem feedback_loop_terminates (s : Signal) :\n  s.terminate_after_one_pass = true → ¬ cycles s',                                                                                                 file: 'Theorems/Pipeline.lean',        jobs: 178 },
  { id: 9,  name: 'confirm_list_requires_human',        desc: 'All actions on the confirm list require explicit human confirmation before execution.',                   lean: 'theorem confirm_list_requires_human (a : Agent) (act : Action) :\n  act ∈ a.contract.confirm_list → requiresHumanConfirm act',                                                                    file: 'Theorems/HumanOversight.lean',  jobs: 267 },
  { id: 10, name: 'low_trust_cannot_escalate',          desc: 'A Low-trust agent cannot autonomously route escalations.',                                                lean: 'theorem low_trust_cannot_escalate (a : Agent) :\n  a.trust = Low → ¬ canEscalate a',                                                                                                               file: 'Theorems/Trust.lean',           jobs: 134 },
  { id: 11, name: 'launch_authorisation_human_only',    desc: 'The action issue_launch_authorisation is permanently blocked for all agents.',                            lean: 'theorem launch_authorisation_human_only (a : Agent) :\n  ¬ canPerform a issue_launch_authorisation',                                                                                                   file: 'Theorems/HumanOversight.lean',  jobs: 89  },
  { id: 12, name: 'maneuver_command_blocked',           desc: 'No agent may issue spacecraft maneuver commands.',                                                        lean: 'theorem maneuver_command_blocked (a : Agent) :\n  ¬ canPerform a command_maneuver',                                                                                                                     file: 'Theorems/HumanOversight.lean',  jobs: 74  },
  { id: 13, name: 'pipeline_acyclic',                   desc: 'The agent pipeline graph (excluding approved feedback signals) is acyclic.',                              lean: 'theorem pipeline_acyclic : DAG agent_pipeline',                                                                                                                                                       file: 'Theorems/Pipeline.lean',        jobs: 312 },
  { id: 14, name: 'public_output_label_preserved',      desc: 'Once labelled Public, an output cannot be relabelled to a higher security class.',                       lean: 'theorem public_output_label_preserved (d : LabelledData) :\n  d.label = Public → ∀ op, (op d).label = Public',                                                                                      file: 'Theorems/Taint.lean',           jobs: 156 },
  { id: 15, name: 'no_dual_allow_block',                desc: 'No action may appear in both the allow list and block list of any agent.',                               lean: 'theorem no_dual_allow_block (a : Agent) (act : Action) :\n  ¬ (act ∈ a.contract.allow_list ∧ act ∈ a.contract.block_list)',                                                                       file: 'Theorems/Contracts.lean',       jobs: 198 },
  { id: 16, name: 'trust_level_determines_capability',  desc: 'Agent capabilities are strictly bounded by their assigned trust level.',                                  lean: 'theorem trust_level_determines_capability (a b : Agent) :\n  a.trust < b.trust → capabilities a ⊆ capabilities b',                                                                                 file: 'Theorems/Trust.lean',           jobs: 241 },
  { id: 17, name: 'escalation_must_route_to_human',     desc: 'All escalation signals must terminate at a human authority node.',                                        lean: 'theorem escalation_must_route_to_human (e : Escalation) :\n  ∃ h : HumanAuthority, e.routes_to h',                                                                                                   file: 'Theorems/HumanOversight.lean',  jobs: 167 },
  { id: 18, name: 'contract_immutable_at_runtime',      desc: 'Agent contracts cannot be modified during pipeline execution.',                                           lean: 'theorem contract_immutable_at_runtime (a : Agent) :\n  ∀ t : Time, t > pipeline_start → a.contract = a.contract₀',                                                                                file: 'Theorems/Contracts.lean',       jobs: 212 },
];

// ── Shared components ─────────────────────────────────────────────────────────
function Sidebar({ page, setPage }) {
  return (
    <div style={{ width: 220, flexShrink: 0, background: C.s1, borderRight: `1px solid ${C.border}`, display: 'flex', flexDirection: 'column', height: '100vh', position: 'sticky', top: 0 }}>
      <div style={{ padding: '20px 18px 16px', borderBottom: `1px solid ${C.border}` }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 6 }}>
          <div style={{ width: 28, height: 28, borderRadius: 4, background: `linear-gradient(135deg, ${C.blue}, ${C.purple})`, display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 12, fontWeight: 700, color: '#fff', flexShrink: 0 }}>AL</div>
          <span style={{ fontFamily: 'Space Grotesk, sans-serif', fontWeight: 700, fontSize: 15, color: C.text, letterSpacing: 2 }}>AGENL</span>
        </div>
        <div style={{ fontSize: 10, color: C.textMut, fontFamily: 'JetBrains Mono, monospace', letterSpacing: 1 }}>AGENT DEFINITION LANGUAGE</div>
      </div>
      <div style={{ padding: '10px 18px', background: `${C.green}11`, borderBottom: `1px solid ${C.border}` }}>
        <div style={{ fontSize: 9, color: C.green, fontFamily: 'JetBrains Mono, monospace', letterSpacing: 1 }}>● BUILD STATUS</div>
        <div style={{ fontSize: 10, color: C.green, fontFamily: 'JetBrains Mono, monospace', marginTop: 2 }}>18 theorems · exit 0</div>
      </div>
      <nav style={{ flex: 1, padding: '12px 0' }}>
        {NAV.map(item => {
          const active = page === item.id;
          return (
            <div key={item.id} onClick={() => setPage(item.id)}
              style={{ display: 'flex', alignItems: 'center', gap: 10, padding: '9px 18px', cursor: 'pointer', background: active ? `${C.blue}18` : 'transparent', borderLeft: active ? `2px solid ${C.blue}` : '2px solid transparent', transition: 'all 0.15s' }}
              onMouseEnter={e => { if (!active) e.currentTarget.style.background = C.s3; }}
              onMouseLeave={e => { if (!active) e.currentTarget.style.background = 'transparent'; }}>
              <span style={{ fontSize: 12, color: active ? C.blue : C.textMut, fontFamily: 'JetBrains Mono, monospace' }}>{item.icon}</span>
              <span style={{ fontSize: 12, fontFamily: 'Space Grotesk, sans-serif', fontWeight: active ? 600 : 400, color: active ? C.text : C.textSec }}>{item.label}</span>
            </div>
          );
        })}
      </nav>
      <div style={{ padding: '14px 18px', borderTop: `1px solid ${C.border}`, fontSize: 10, color: C.textMut, fontFamily: 'JetBrains Mono, monospace' }}>lake build · 3298 jobs</div>
    </div>
  );
}

function TrustBadge({ level }) {
  const map = { Low: { bg: '#f59e0b22', c: '#f59e0b' }, Medium: { bg: '#6366f122', c: '#6366f1' }, High: { bg: '#22c55e22', c: '#22c55e' } };
  const s = map[level] || map.Medium;
  return <span style={{ background: s.bg, color: s.c, border: `1px solid ${s.c}44`, borderRadius: 4, padding: '2px 7px', fontSize: 10, fontFamily: 'JetBrains Mono, monospace', fontWeight: 600 }}>{level}</span>;
}

function StatusBadge({ status }) {
  const map = {
    'Verified': { bg: '#22c55e22', c: '#22c55e' }, 'Unverified': { bg: '#f43f5e22', c: '#f43f5e' },
    'ALLOWED': { bg: '#22c55e22', c: '#22c55e' }, 'BLOCKED': { bg: '#f43f5e22', c: '#f43f5e' },
    'PERMITTED': { bg: '#22c55e22', c: '#22c55e' }, 'NOT PERMITTED': { bg: '#f59e0b22', c: '#f59e0b' },
  };
  const s = map[status] || { bg: '#45487222', c: '#454a72' };
  return <span style={{ background: s.bg, color: s.c, border: `1px solid ${s.c}44`, borderRadius: 4, padding: '2px 7px', fontSize: 10, fontFamily: 'JetBrains Mono, monospace', fontWeight: 600, letterSpacing: 0.5 }}>{status}</span>;
}

function Card({ children, style = {}, onClick }) {
  return <div onClick={onClick} style={{ background: C.s2, border: `1px solid ${C.border}`, borderRadius: 8, padding: '16px 18px', ...style }}>{children}</div>;
}

function CardTitle({ children }) {
  return <div style={{ fontSize: 10, fontFamily: 'Space Grotesk, sans-serif', fontWeight: 600, color: C.textMut, letterSpacing: 1, textTransform: 'uppercase', marginBottom: 14 }}>{children}</div>;
}

function PageHeader({ title, subtitle }) {
  return (
    <div style={{ marginBottom: 24 }}>
      <h1 style={{ margin: 0, fontSize: 22, fontFamily: 'Space Grotesk, sans-serif', fontWeight: 700, color: C.text }}>{title}</h1>
      {subtitle && <p style={{ margin: '4px 0 0', fontSize: 12, color: C.textSec }}>{subtitle}</p>}
    </div>
  );
}

function FieldInput({ label, value, onChange, type = 'text', options, placeholder }) {
  const base = { width: '100%', background: C.s3, border: `1px solid ${C.border2}`, borderRadius: 6, padding: '8px 12px', color: C.text, fontFamily: 'Space Grotesk, sans-serif', fontSize: 12, outline: 'none', boxSizing: 'border-box' };
  return (
    <div style={{ marginBottom: 12 }}>
      {label && <label style={{ display: 'block', fontSize: 10, color: C.textSec, marginBottom: 4, fontWeight: 500 }}>{label}</label>}
      {options ? (
        <select value={value} onChange={e => onChange(e.target.value)} style={{ ...base, cursor: 'pointer' }}>
          {options.map(o => <option key={o}>{o}</option>)}
        </select>
      ) : (
        <input type={type} value={value} onChange={e => onChange(e.target.value)} placeholder={placeholder} style={base} />
      )}
    </div>
  );
}

function MonoBlock({ children, color }) {
  return <pre style={{ background: C.bg, border: `1px solid ${C.border}`, borderRadius: 6, padding: '12px 14px', fontFamily: 'JetBrains Mono, monospace', fontSize: 11, color: color || C.green, overflowX: 'auto', margin: 0, lineHeight: 1.6 }}>{children}</pre>;
}

// ── Voice narration ───────────────────────────────────────────────────────────
const NARRATION = {
  contracts:    "Agent Contracts. This library shows all twelve defined agents with their trust levels, allow and block list counts, and verification status. Click any card to expand the full contract definition.",
  define:       "Define Agent. Use this builder to create a new agent contract. As you type, live validation checks for conflicts — if any tool appears in both the allow and block list, a warning is shown immediately.",
  verification: "Verification. Two interactive checks let you test the system. The action permission check tells you whether a specific action is allowed, blocked, or not permitted for any agent.",
  trace:        "Execution Trace. The complete trace from the last pipeline run. Each collapsible section shows an agent's input label, output label, and any blocked actions.",
  infoflow:     "Information Flow. The DataLabel lattice shows three security levels: Public at rank zero, Internal at rank one, and Secret at rank two. Data can only flow to labels of equal or higher rank.",
  safetylog:    "Safety Log. A complete timestamped record of every action attempted during pipeline execution. Blocked actions appear in red with the theorem name.",
  proofs:       "Proofs. All eighteen Lean-verified theorems that formally guarantee the safety properties of the AGENL framework. Click any theorem to expand its Lean four notation.",
};

// ── Page 1: Agent Contracts ───────────────────────────────────────────────────
function AgentContractsPage() {
  const [expanded, setExpanded] = useState(null);
  return (
    <div>
      <PageHeader title="Agent Contracts" subtitle="All defined agents with their verified contracts. Click to expand." />
      <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 14 }}>
        {CONTRACTS.map(agent => (
          <Card key={agent.id} style={{ cursor: 'pointer', borderLeft: `3px solid ${agent.verified ? C.green : C.red}`, transition: 'all 0.15s' }}
            onClick={() => setExpanded(expanded === agent.id ? null : agent.id)}>
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: 10 }}>
              <div>
                <div style={{ fontSize: 13, fontWeight: 600, color: C.text, marginBottom: 3 }}>{agent.name}</div>
                <div style={{ fontSize: 10, color: C.textMut, fontFamily: 'JetBrains Mono, monospace' }}>Layer {agent.layer}</div>
              </div>
              <div style={{ display: 'flex', gap: 6 }}>
                <TrustBadge level={agent.trust} />
                <StatusBadge status={agent.verified ? 'Verified' : 'Unverified'} />
              </div>
            </div>
            <div style={{ display: 'flex', gap: 16, fontSize: 10, color: C.textSec }}>
              <span>✓ Allow: <strong style={{ color: C.text }}>{agent.allow.length}</strong></span>
              <span>✗ Block: <strong style={{ color: C.text }}>{agent.block.length}</strong></span>
              <span>? Confirm: <strong style={{ color: C.text }}>{agent.confirm.length}</strong></span>
            </div>
            {expanded === agent.id && (
              <div style={{ marginTop: 14, paddingTop: 14, borderTop: `1px solid ${C.border}`, animation: 'fadeIn 0.2s ease' }}>
                <div style={{ fontSize: 11, color: C.textSec, marginBottom: 10, lineHeight: 1.5 }}>
                  <strong style={{ color: C.textMut, fontFamily: 'JetBrains Mono, monospace', fontSize: 9 }}>GOAL</strong><br />{agent.goal}
                </div>
                <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 10, marginBottom: 10 }}>
                  <div>
                    <div style={{ fontSize: 9, color: C.green, fontFamily: 'JetBrains Mono, monospace', marginBottom: 4 }}>ALLOW</div>
                    {agent.allow.map(a => <div key={a} style={{ fontSize: 10, color: C.textSec, fontFamily: 'JetBrains Mono, monospace', padding: '1px 0' }}><span style={{ color: C.green }}>+</span> {a}</div>)}
                  </div>
                  <div>
                    <div style={{ fontSize: 9, color: C.red, fontFamily: 'JetBrains Mono, monospace', marginBottom: 4 }}>BLOCK</div>
                    {agent.block.map(b => <div key={b} style={{ fontSize: 10, color: C.textSec, fontFamily: 'JetBrains Mono, monospace', padding: '1px 0' }}><span style={{ color: C.red }}>✗</span> {b}</div>)}
                  </div>
                </div>
                {agent.confirm.length > 0 && (
                  <div style={{ marginBottom: 8 }}>
                    <div style={{ fontSize: 9, color: C.amber, fontFamily: 'JetBrains Mono, monospace', marginBottom: 4 }}>CONFIRM (requires human)</div>
                    {agent.confirm.map(c => <div key={c} style={{ fontSize: 10, color: C.textSec, fontFamily: 'JetBrains Mono, monospace', padding: '1px 0' }}>? {c}</div>)}
                  </div>
                )}
                <div style={{ display: 'flex', gap: 16, fontSize: 10, color: C.textSec, flexWrap: 'wrap' }}>
                  <span>on_uncertain: <span style={{ color: C.cyan, fontFamily: 'JetBrains Mono, monospace' }}>{agent.onUncertain}</span></span>
                  <span>on_error: <span style={{ color: C.cyan, fontFamily: 'JetBrains Mono, monospace' }}>{agent.onError}</span></span>
                </div>
              </div>
            )}
          </Card>
        ))}
      </div>
    </div>
  );
}

// ── Page 2: Define Agent ──────────────────────────────────────────────────────
function DefineAgentPage() {
  const [form, setForm] = useState({ name: '', goal: '', persona: '', trust: 'Medium', onUncertain: 'escalate', onError: 'stop', allow: [], block: [], confirm: [], memShort: 'session', memLong: '' });
  const [allowInput, setAllowInput] = useState('');
  const [blockInput, setBlockInput] = useState('');
  const [confirmInput, setConfirmInput] = useState('');
  const [showContract, setShowContract] = useState(false);
  const [verifyResult, setVerifyResult] = useState(null);
  const [nlDescription, setNlDescription] = useState('');
  const [nlLoading, setNlLoading] = useState(false);
  const [nlMessage, setNlMessage] = useState(null);
  const set = (k, v) => setForm(p => ({ ...p, [k]: v }));

  const generateFromDescription = async () => {
    if (!nlDescription.trim()) return;
    setNlLoading(true);
    setNlMessage(null);
    try {
      const response = await fetch('/api/convert', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ description: nlDescription.trim() }),
      });
      if (!response.ok) {
        const err = await response.json().catch(() => ({}));
        throw new Error(err.error?.message || `API error ${response.status}`);
      }
      const data = await response.json();
      let parsed;
      if (typeof data.result === 'string') {
        parsed = JSON.parse(data.result);
      } else {
        parsed = data.result;
      }
      const capitalise = s => (s && typeof s === 'string') ? s.charAt(0).toUpperCase() + s.slice(1).toLowerCase() : 'Medium';
      setForm({
        name: parsed.name || '',
        goal: parsed.goal || '',
        persona: '',
        trust: capitalise(parsed.trust),
        onUncertain: parsed.on_uncertain || 'escalate',
        onError: parsed.on_error || 'stop',
        allow: Array.isArray(parsed.allow) ? parsed.allow : [],
        block: Array.isArray(parsed.block) ? parsed.block : [],
        confirm: Array.isArray(parsed.confirm) ? parsed.confirm : [],
        memShort: 'session',
        memLong: '',
      });
      setVerifyResult(null);
      setShowContract(true);
      setNlMessage({ type: 'success', text: 'Contract generated from your description' });
    } catch (e) {
      setNlMessage({ type: 'error', text: `Generation failed: ${e.message}` });
    } finally {
      setNlLoading(false);
    }
  };

  const dualConflict = form.allow.filter(a => form.block.includes(a));
  const warnings = [
    dualConflict.length > 0 && { type: 'error', msg: `Conflict: "${dualConflict.join(', ')}" appears in both allow and block list` },
    form.allow.length === 0 && { type: 'warn', msg: 'Allow list is empty — agent cannot perform any actions' },
    !form.name && { type: 'warn', msg: 'Agent name is required' },
  ].filter(Boolean);

  const contractText = `-- AGENL Contract: ${form.name || '<unnamed>'}
agent ${form.name || 'unnamed'} where
  goal         := "${form.goal}"
  persona      := "${form.persona}"
  trust        := .${form.trust}
  on_uncertain := .${form.onUncertain}
  on_error     := .${form.onError}
  allow_list   := [${form.allow.map(a => `\n    .${a}`).join(',')}${form.allow.length ? '\n  ' : ''}]
  block_list   := [${form.block.map(b => `\n    .${b}`).join(',')}${form.block.length ? '\n  ' : ''}]
  confirm_list := [${form.confirm.map(c => `\n    .${c}`).join(',')}${form.confirm.length ? '\n  ' : ''}]
  memory := {
    short := .${form.memShort},
    long  := "${form.memLong || 'none'}"
  }`;

  const addTool = (listKey, input, setInput) => {
    if (!input.trim()) return;
    set(listKey, [...form[listKey], input.trim().replace(/\s+/g, '_')]);
    setInput('');
    setVerifyResult(null);
  };

  const ToolList = ({ label, listKey, input, setInput, color }) => (
    <div style={{ marginBottom: 14 }}>
      <div style={{ fontSize: 10, color: C.textSec, marginBottom: 5, fontWeight: 500 }}>{label}</div>
      <div style={{ display: 'flex', gap: 6, marginBottom: 8 }}>
        <input value={input} onChange={e => setInput(e.target.value)}
          onKeyDown={e => e.key === 'Enter' && addTool(listKey, input, setInput)}
          placeholder="action_name"
          style={{ flex: 1, background: C.s3, border: `1px solid ${C.border2}`, borderRadius: 6, padding: '6px 10px', color: C.text, fontFamily: 'JetBrains Mono, monospace', fontSize: 11, outline: 'none' }} />
        <button onClick={() => addTool(listKey, input, setInput)} style={{ background: color + '22', border: `1px solid ${color}44`, borderRadius: 6, padding: '6px 12px', color, fontFamily: 'Space Grotesk, sans-serif', fontSize: 11, cursor: 'pointer' }}>Add</button>
      </div>
      <div style={{ display: 'flex', flexWrap: 'wrap', gap: 5 }}>
        {form[listKey].map(item => (
          <span key={item} onClick={() => { set(listKey, form[listKey].filter(i => i !== item)); setVerifyResult(null); }}
            style={{ background: color + '15', color, border: `1px solid ${color}33`, borderRadius: 4, padding: '2px 8px', fontSize: 10, fontFamily: 'JetBrains Mono, monospace', cursor: 'pointer' }}>
            {item} ×
          </span>
        ))}
      </div>
    </div>
  );

  return (
    <div style={{ maxWidth: 900 }}>
      <PageHeader title="Define Agent" subtitle="Build a new agent contract. Validation runs live." />

      {/* ── Natural Language Input ── */}
      <Card style={{ marginBottom: 20, border: `1px solid ${C.blue}44`, background: `${C.blue}08` }}>
        <CardTitle>Natural Language Input</CardTitle>
        <textarea
          value={nlDescription}
          onChange={e => setNlDescription(e.target.value)}
          rows={5}
          placeholder={'Describe your agent in plain English. Example:\nAn AI agent for a neuroscience research lab that searches PubMed and analyses brain imaging data but never deletes experimental data or submits to journals without principal investigator approval'}
          style={{ width: '100%', background: C.s3, border: `1px solid ${C.border2}`, borderRadius: 6, padding: '10px 12px', color: C.text, fontFamily: 'Space Grotesk, sans-serif', fontSize: 12, outline: 'none', resize: 'vertical', lineHeight: 1.6, boxSizing: 'border-box' }}
        />
        <button
          onClick={generateFromDescription}
          disabled={nlLoading || !nlDescription.trim()}
          style={{ marginTop: 10, width: '100%', background: nlLoading ? C.blue + '33' : C.blue, border: 'none', borderRadius: 7, padding: '11px 0', color: '#fff', fontFamily: 'Space Grotesk, sans-serif', fontSize: 13, fontWeight: 700, cursor: nlLoading || !nlDescription.trim() ? 'not-allowed' : 'pointer', opacity: !nlDescription.trim() ? 0.5 : 1, letterSpacing: 0.3, transition: 'all 0.15s' }}>
          {nlLoading ? 'Generating contract…' : 'Generate Contract from Description'}
        </button>
        {nlMessage && (
          <div style={{ marginTop: 10, background: `${nlMessage.type === 'success' ? C.green : nlMessage.type === 'warn' ? C.amber : C.red}15`, border: `1px solid ${nlMessage.type === 'success' ? C.green : nlMessage.type === 'warn' ? C.amber : C.red}44`, borderRadius: 6, padding: '8px 12px', fontSize: 12, color: nlMessage.type === 'success' ? C.green : nlMessage.type === 'warn' ? C.amber : C.red, fontFamily: 'Space Grotesk, sans-serif' }}>
            {nlMessage.type === 'success' ? '✓ ' : nlMessage.type === 'warn' ? '⚠ ' : '✗ '}{nlMessage.text}
          </div>
        )}
      </Card>

      {/* ── Divider ── */}
      <div style={{ display: 'flex', alignItems: 'center', gap: 12, marginBottom: 20 }}>
        <div style={{ flex: 1, height: 1, background: C.border }} />
        <span style={{ fontSize: 11, color: C.textMut, fontFamily: 'Space Grotesk, sans-serif', whiteSpace: 'nowrap' }}>— or fill manually below —</span>
        <div style={{ flex: 1, height: 1, background: C.border }} />
      </div>

      <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 20 }}>
        <div>
          <Card style={{ marginBottom: 16 }}>
            <CardTitle>Identity</CardTitle>
            <FieldInput label="Agent Name" value={form.name} onChange={v => { set('name', v); setVerifyResult(null); }} placeholder="MyAgent" />
            <FieldInput label="Goal" value={form.goal} onChange={v => set('goal', v)} placeholder="Describe what this agent does" />
            <FieldInput label="Persona" value={form.persona} onChange={v => set('persona', v)} placeholder="Behavioural guidance for the agent" />
            <FieldInput label="Trust Level" value={form.trust} onChange={v => set('trust', v)} options={['Low', 'Medium', 'High']} />
            <FieldInput label="On Uncertain" value={form.onUncertain} onChange={v => set('onUncertain', v)} options={['escalate', 'say_so', 'stop']} />
            <FieldInput label="On Error" value={form.onError} onChange={v => set('onError', v)} options={['escalate', 'stop']} />
          </Card>
          <Card>
            <CardTitle>Memory</CardTitle>
            <FieldInput label="Short-term" value={form.memShort} onChange={v => set('memShort', v)} options={['session', 'none']} />
            <FieldInput label="Long-term store" value={form.memLong} onChange={v => set('memLong', v)} placeholder="e.g. mission_history" />
          </Card>
        </div>
        <div>
          <Card style={{ marginBottom: 16 }}>
            <CardTitle>Permissions</CardTitle>
            <ToolList label="Allow List" listKey="allow" input={allowInput} setInput={setAllowInput} color={C.green} />
            <ToolList label="Block List" listKey="block" input={blockInput} setInput={setBlockInput} color={C.red} />
            <ToolList label="Confirm List" listKey="confirm" input={confirmInput} setInput={setConfirmInput} color={C.amber} />
          </Card>
          <Card>
            <CardTitle>Live Validation</CardTitle>
            {warnings.length === 0 ? (
              <div style={{ display: 'flex', gap: 8, alignItems: 'center', color: C.green, fontSize: 12 }}><span>✓</span><span>Contract valid</span></div>
            ) : warnings.map((w, i) => (
              <div key={i} style={{ background: `${w.type === 'error' ? C.red : C.amber}11`, border: `1px solid ${w.type === 'error' ? C.red : C.amber}33`, borderRadius: 5, padding: '7px 10px', marginBottom: 6, fontSize: 11, color: w.type === 'error' ? C.red : C.amber }}>
                {w.type === 'error' ? '✗ ' : '⚠ '}{w.msg}
              </div>
            ))}
            <div style={{ display: 'flex', gap: 8, marginTop: 12 }}>
              <button onClick={() => setShowContract(!showContract)} style={{ flex: 1, background: C.blue + '22', border: `1px solid ${C.blue}44`, borderRadius: 6, padding: 8, color: C.blue, fontFamily: 'Space Grotesk, sans-serif', fontSize: 11, cursor: 'pointer', fontWeight: 600 }}>
                {showContract ? 'Hide' : 'Generate'} Contract
              </button>
              <button onClick={() => { const ok = dualConflict.length === 0 && form.allow.length > 0 && form.name; setVerifyResult(ok ? 'verified' : 'failed'); }}
                style={{ flex: 1, background: C.green + '22', border: `1px solid ${C.green}44`, borderRadius: 6, padding: 8, color: C.green, fontFamily: 'Space Grotesk, sans-serif', fontSize: 11, cursor: 'pointer', fontWeight: 600 }}>
                Verify with Lean
              </button>
            </div>
            {verifyResult && (
              <div style={{ marginTop: 10, background: `${verifyResult === 'verified' ? C.green : C.red}11`, border: `1px solid ${verifyResult === 'verified' ? C.green : C.red}33`, borderRadius: 5, padding: '8px 10px', fontSize: 11, color: verifyResult === 'verified' ? C.green : C.red, fontFamily: 'JetBrains Mono, monospace' }}>
                {verifyResult === 'verified' ? '✓ lake build: exit 0 — all theorems satisfied' : '✗ Verification failed — resolve warnings before verifying'}
              </div>
            )}
          </Card>
        </div>
      </div>
      {showContract && (
        <div style={{ marginTop: 16 }}>
          <Card>
            <CardTitle>.agenl Contract Output</CardTitle>
            <MonoBlock>{contractText}</MonoBlock>
          </Card>
        </div>
      )}
    </div>
  );
}

// ── Page 3: Verification ──────────────────────────────────────────────────────
function VerificationPage() {
  const [actionAgent, setActionAgent] = useState(CONTRACTS[0].name);
  const [actionName, setActionName] = useState('');
  const [actionResult, setActionResult] = useState(null);
  const [flowSrc, setFlowSrc] = useState('Public');
  const [flowDst, setFlowDst] = useState('Public');
  const [flowResult, setFlowResult] = useState(null);
  const RANKS = { Public: 0, Internal: 1, Secret: 2 };

  const checkAction = () => {
    const agent = CONTRACTS.find(a => a.name === actionAgent);
    const act = actionName.trim();
    if (!act) return;
    if (agent.block.includes(act)) setActionResult({ status: 'BLOCKED', detail: `Theorem: blocked_action_impossible — "${act}" is in block_list`, theorem: 'blocked_action_impossible' });
    else if (agent.allow.includes(act)) setActionResult({ status: 'ALLOWED', detail: `Action "${act}" is in allow_list for ${actionAgent}`, theorem: null });
    else setActionResult({ status: 'NOT PERMITTED', detail: `"${act}" is not in the allow list for ${actionAgent}`, theorem: null });
  };

  const checkFlow = () => {
    const srcRank = RANKS[flowSrc], dstRank = RANKS[flowDst];
    if (srcRank <= dstRank) setFlowResult({ status: 'PERMITTED', detail: `canFlowTo ${flowSrc}(rank ${srcRank}) → ${flowDst}(rank ${dstRank}): rank comparison satisfied`, theorem: 'canFlowTo_transitive' });
    else setFlowResult({ status: 'BLOCKED', detail: `Theorem: ${flowSrc === 'Secret' && flowDst === 'Public' ? 'secret_cannot_flow_to_public' : 'internal_cannot_flow_to_public'} — rank ${srcRank} > ${dstRank}`, theorem: flowSrc === 'Secret' ? 'secret_cannot_flow_to_public' : 'internal_cannot_flow_to_public' });
  };

  const resultColor = (status) => status === 'ALLOWED' || status === 'PERMITTED' ? C.green : status === 'BLOCKED' ? C.red : C.amber;

  return (
    <div style={{ maxWidth: 900 }}>
      <PageHeader title="Verification" subtitle="Interactive permission and information flow checks backed by Lean proofs." />
      <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 20 }}>
        <Card>
          <CardTitle>Action Permission Check</CardTitle>
          <FieldInput label="Agent" value={actionAgent} onChange={v => { setActionAgent(v); setActionResult(null); }} options={CONTRACTS.map(a => a.name)} />
          <FieldInput label="Action Name" value={actionName} onChange={v => { setActionName(v); setActionResult(null); }} placeholder="e.g. command_maneuver" />
          <button onClick={checkAction} style={{ width: '100%', background: C.blue + '22', border: `1px solid ${C.blue}44`, borderRadius: 6, padding: 9, color: C.blue, fontFamily: 'Space Grotesk, sans-serif', fontSize: 12, cursor: 'pointer', fontWeight: 600, marginBottom: 12 }}>Check Permission</button>
          {actionResult && (
            <div style={{ background: `${resultColor(actionResult.status)}11`, border: `1px solid ${resultColor(actionResult.status)}33`, borderRadius: 6, padding: 12, marginBottom: 12 }}>
              <div style={{ marginBottom: 6 }}><StatusBadge status={actionResult.status} /></div>
              <div style={{ fontSize: 11, color: C.textSec, marginBottom: actionResult.theorem ? 8 : 0 }}>{actionResult.detail}</div>
              {actionResult.theorem && <MonoBlock color={C.red}>{`theorem ${actionResult.theorem}`}</MonoBlock>}
            </div>
          )}
          <div>
            <div style={{ fontSize: 9, color: C.textMut, fontFamily: 'JetBrains Mono, monospace', marginBottom: 8 }}>TRY THESE EXAMPLES</div>
            {[['OrbitalMechanicsAgent', 'command_maneuver'], ['ScheduleAnalyser', 'compute_schedule_risk'], ['LaunchReadinessAgent', 'issue_launch_authorisation']].map(([ag, act]) => (
              <button key={act} onClick={() => { setActionAgent(ag); setActionName(act); setActionResult(null); }}
                style={{ display: 'block', width: '100%', textAlign: 'left', background: 'transparent', border: `1px solid ${C.border}`, borderRadius: 4, padding: '5px 8px', color: C.textMut, fontFamily: 'JetBrains Mono, monospace', fontSize: 10, cursor: 'pointer', marginBottom: 4 }}>
                {ag} · {act}
              </button>
            ))}
          </div>
        </Card>
        <Card>
          <CardTitle>Information Flow Check</CardTitle>
          <FieldInput label="Source Label" value={flowSrc} onChange={v => { setFlowSrc(v); setFlowResult(null); }} options={['Public', 'Internal', 'Secret']} />
          <FieldInput label="Destination Label" value={flowDst} onChange={v => { setFlowDst(v); setFlowResult(null); }} options={['Public', 'Internal', 'Secret']} />
          <button onClick={checkFlow} style={{ width: '100%', background: C.blue + '22', border: `1px solid ${C.blue}44`, borderRadius: 6, padding: 9, color: C.blue, fontFamily: 'Space Grotesk, sans-serif', fontSize: 12, cursor: 'pointer', fontWeight: 600, marginBottom: 12 }}>Check Flow</button>
          {flowResult && (
            <div style={{ background: `${resultColor(flowResult.status)}11`, border: `1px solid ${resultColor(flowResult.status)}33`, borderRadius: 6, padding: 12, marginBottom: 12 }}>
              <div style={{ marginBottom: 6 }}><StatusBadge status={flowResult.status} /></div>
              <div style={{ fontSize: 11, color: C.textSec, marginBottom: 8 }}>{flowResult.detail}</div>
              {flowResult.theorem && <MonoBlock color={flowResult.status === 'PERMITTED' ? C.green : C.red}>{`theorem ${flowResult.theorem}`}</MonoBlock>}
            </div>
          )}
          <div>
            <div style={{ fontSize: 9, color: C.textMut, fontFamily: 'JetBrains Mono, monospace', marginBottom: 6 }}>LABEL RANK ORDER</div>
            {[['Public', 'rank 0', C.green], ['Internal', 'rank 1', C.cyan], ['Secret', 'rank 2', C.red]].map(([l, r, col]) => (
              <div key={l} style={{ display: 'flex', justifyContent: 'space-between', padding: '5px 0', borderBottom: `1px solid ${C.border}` }}>
                <span style={{ color: col, fontFamily: 'JetBrains Mono, monospace', fontSize: 10 }}>{l}</span>
                <span style={{ color: C.textMut, fontFamily: 'JetBrains Mono, monospace', fontSize: 10 }}>{r}</span>
              </div>
            ))}
          </div>
        </Card>
      </div>
    </div>
  );
}

// ── Page 4: Execution Trace ───────────────────────────────────────────────────
function ExecutionTracePage() {
  const [filter, setFilter] = useState('All');
  const [expanded, setExpanded] = useState(null);
  const TRACE = CONTRACTS.map(a => ({
    ...a,
    inputLabel: 'Internal',
    outputLabel: a.name === 'ExecutiveReportAgent' ? 'Public' : 'Internal',
    blockedAction: a.block[0] || null,
  }));
  const filtered = filter === 'Blocked only' ? TRACE.filter(t => t.blockedAction) : filter === 'Allowed only' ? TRACE.filter(t => !t.blockedAction) : TRACE;

  return (
    <div>
      <PageHeader title="Execution Trace" subtitle="Full trace from the last pipeline run. Each agent's input, decision, and output." />
      <div style={{ display: 'flex', gap: 8, marginBottom: 20 }}>
        {['All', 'Blocked only', 'Allowed only'].map(f => (
          <button key={f} onClick={() => setFilter(f)}
            style={{ background: filter === f ? C.blue + '22' : 'transparent', border: `1px solid ${filter === f ? C.blue : C.border}`, borderRadius: 6, padding: '6px 14px', color: filter === f ? C.blue : C.textSec, fontFamily: 'Space Grotesk, sans-serif', fontSize: 11, cursor: 'pointer' }}>
            {f}
          </button>
        ))}

      <div style={{ display: 'flex', gap: 6, marginBottom: 14, color: C.textMut, fontSize: 9, fontFamily: 'JetBrains Mono, monospace', letterSpacing: 1, padding: '0 4px' }}>
        <span style={{ width: 140 }}>AGENT</span>
        <span style={{ width: 60 }}>LAYER</span>
        <span style={{ width: 80 }}>IN LABEL</span>
        <span style={{ width: 80 }}>OUT LABEL</span>

      {filtered.map(agent => (
        <div key={agent.id} style={{ marginBottom: 6 }}>

            <span style={{ width: 60, fontSize: 10, fontFamily: 'JetBrains Mono, monospace', color: C.textMut }}>L{agent.layer}</span>
            <span style={{ width: 80, fontSize: 10, fontFamily: 'JetBrains Mono, monospace', color: C.cyan }}>{agent.inputLabel}</span>
            <span style={{ width: 80, fontSize: 10, fontFamily: 'JetBrains Mono, monospace', color: agent.outputLabel === 'Public' ? C.green : C.cyan }}>{agent.outputLabel}</span>
            {agent.blockedAction && <span style={{ fontSize: 10, fontFamily: 'JetBrains Mono, monospace', color: C.red }}>✗ {agent.blockedAction}</span>}
          </div>
          {expanded === agent.id && (
            <div style={{ background: C.bg, border: `1px solid ${C.border}`, borderTop: 'none', borderRadius: '0 0 6px 6px', padding: '12px 14px', animation: 'fadeIn 0.2s ease' }}>
              <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 14, marginBottom: agent.blockedAction ? 10 : 0 }}>
                <div>
                  <div style={{ fontSize: 9, color: C.textMut, fontFamily: 'JetBrains Mono, monospace', marginBottom: 4 }}>INPUT</div>
                  <div style={{ fontSize: 11, color: C.textSec }}>{agent.goal}</div>
                </div>
                <div>
                  <div style={{ fontSize: 9, color: C.textMut, fontFamily: 'JetBrains Mono, monospace', marginBottom: 4 }}>OUTPUT LABEL</div>
                  <div style={{ fontSize: 11, color: agent.outputLabel === 'Public' ? C.green : C.cyan, fontFamily: 'JetBrains Mono, monospace' }}>DataLabel.{agent.outputLabel}</div>
                </div>
              </div>
              {agent.blockedAction && (
                <div style={{ marginTop: 8, background: C.red + '11', border: `1px solid ${C.red}33`, borderRadius: 5, padding: '8px 10px' }}>
                  <div style={{ fontSize: 9, color: C.red, fontFamily: 'JetBrains Mono, monospace', marginBottom: 3 }}>BLOCKED ACTION</div>
                  <div style={{ fontSize: 10, color: C.red, fontFamily: 'JetBrains Mono, monospace' }}>{agent.blockedAction} — theorem: blocked_action_impossible</div>
                </div>
              )}
            </div>
          )}
        </div>
      ))}
    </div>
  );
}

// ── Page 5: Info Flow ─────────────────────────────────────────────────────────

              {i < LABELS.length - 1 && (

        </div>
        {LABELS.map(l => (
          <div key={l.name} style={{ marginBottom: 14, paddingBottom: 14, borderBottom: `1px solid ${C.border}` }}>
            <div style={{ display: 'flex', alignItems: 'center', gap: 10, marginBottom: 6 }}>
              <span style={{ fontSize: 13, fontWeight: 600, color: l.color, fontFamily: 'JetBrains Mono, monospace' }}>{l.name}</span>
              <span style={{ fontSize: 10, color: C.textSec }}>{l.desc}</span>
            </div>
            <div style={{ display: 'flex', flexWrap: 'wrap', gap: 5 }}>
              {l.agents.map(a => <span key={a} style={{ background: l.color + '15', color: l.color, border: `1px solid ${l.color}33`, borderRadius: 4, padding: '2px 7px', fontSize: 10, fontFamily: 'JetBrains Mono, monospace' }}>{a}</span>)}
            </div>
          </div>
        ))}
      </Card>
      <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 20 }}>
        <Card>
          <CardTitle>Taint Tracking — LabelledData</CardTitle>
          <MonoBlock>{`structure LabelledData where
  content : α
  label   : DataLabel

-- Labels travel with data items
def taint (d : LabelledData)
          (op : α → β) : LabelledData :=
  { content := op d.content
  , label   := d.label }`}</MonoBlock>
        </Card>
        <Card>
          <CardTitle>Feedback Arrow — terminate_after_one_pass</CardTitle>
          <div style={{ fontSize: 11, color: C.textSec, lineHeight: 1.6, marginBottom: 12 }}>
            SubsystemRelationships → ScheduleAnalyser feedback signal is labelled Internal and carries <code style={{ fontFamily: 'JetBrains Mono, monospace', color: C.cyan }}>terminate_after_one_pass = true</code>. The pipeline rejects any second traversal of this edge.
          </div>
          <MonoBlock color={C.purple}>{`-- theorem feedback_loop_terminates
theorem feedback_loop_terminates
    (s : Signal) :
  s.terminate_after_one_pass = true
  → ¬ cycles s`}</MonoBlock>
        </Card>
      </div>
    </div>
  );
}

// ── Page 6: Safety Log ────────────────────────────────────────────────────────
function SafetyLogPage() {
  const [agentFilter, setAgentFilter] = useState('All');
  const [statusFilter, setStatusFilter] = useState('All');

  const LOG = CONTRACTS.flatMap(a => [
    ...a.allow.slice(0, 2).map((act, i) => ({ id: `${a.id}-a${i}`, time: `14:0${a.id % 10}:${String(i * 12).padStart(2, '0')} UTC`, agent: a.name, action: act, status: 'ALLOWED', theorem: null, ref: `allow_list[${i}]` })),
    a.block.length > 0 ? { id: `${a.id}-b`, time: `14:0${a.id % 10}:55 UTC`, agent: a.name, action: a.block[0], status: 'BLOCKED', theorem: 'blocked_action_impossible', ref: null } : null,
  ].filter(Boolean)).sort((a, b) => a.time.localeCompare(b.time));

  const agents = ['All', ...new Set(CONTRACTS.map(a => a.name))];
  const filtered = LOG.filter(e => (agentFilter === 'All' || e.agent === agentFilter) && (statusFilter === 'All' || e.status === statusFilter));

  return (
    <div>
      <PageHeader title="Safety Log" subtitle={`${LOG.filter(e => e.status === 'BLOCKED').length} blocked · ${LOG.filter(e => e.status === 'ALLOWED').length} allowed`} />
      <div style={{ display: 'flex', gap: 10, marginBottom: 20, flexWrap: 'wrap', alignItems: 'center' }}>
        <select value={agentFilter} onChange={e => setAgentFilter(e.target.value)}
          style={{ background: C.s2, border: `1px solid ${C.border}`, borderRadius: 6, padding: '6px 10px', color: C.text, fontFamily: 'Space Grotesk, sans-serif', fontSize: 11, outline: 'none', cursor: 'pointer' }}>
          {agents.map(a => <option key={a}>{a}</option>)}
        </select>
        {[['All', C.blue], ['BLOCKED', C.red], ['ALLOWED', C.green]].map(([s, col]) => (
          <button key={s} onClick={() => setStatusFilter(s)}
            style={{ background: statusFilter === s ? col + '22' : 'transparent', border: `1px solid ${statusFilter === s ? col : C.border}44`, borderRadius: 6, padding: '6px 14px', color: col, fontFamily: 'Space Grotesk, sans-serif', fontSize: 11, cursor: 'pointer' }}>
            {s}
          </button>
        ))}
      </div>
      <div style={{ fontFamily: 'JetBrains Mono, monospace', fontSize: 10 }}>
        <div style={{ display: 'grid', gridTemplateColumns: '120px 200px 180px 80px 1fr', gap: 8, padding: '6px 10px', color: C.textMut, borderBottom: `1px solid ${C.border}`, letterSpacing: 1, fontSize: 9 }}>
          <span>TIMESTAMP</span><span>AGENT</span><span>ACTION</span><span>STATUS</span><span>REFERENCE</span>
        </div>
        {filtered.map(e => (
          <div key={e.id} style={{ display: 'grid', gridTemplateColumns: '120px 200px 180px 80px 1fr', gap: 8, padding: '7px 10px', borderBottom: `1px solid ${C.border}`, background: e.status === 'BLOCKED' ? C.red + '08' : 'transparent' }}>
            <span style={{ color: C.textMut }}>{e.time}</span>
            <span style={{ color: C.textSec, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{e.agent}</span>
            <span style={{ color: C.text }}>{e.action}</span>
            <span style={{ color: e.status === 'BLOCKED' ? C.red : C.green }}>{e.status}</span>
            <span style={{ color: e.theorem ? C.red : C.textMut }}>{e.theorem || e.ref}</span>
          </div>
        ))}
      </div>
    </div>
  );
}

// ── Page 7: Proofs ────────────────────────────────────────────────────────────
function ProofsPage() {
  const [expanded, setExpanded] = useState(null);
  return (
    <div>
      <PageHeader title="Proofs" subtitle="All 18 verified theorems. Lean 4 · lake build exit 0 · 3298 jobs." />
      <Card style={{ marginBottom: 20, background: C.green + '0d', borderColor: C.green + '33' }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 16 }}>
          <div style={{ width: 10, height: 10, borderRadius: '50%', background: C.green, flexShrink: 0, animation: 'glowPulse 2s infinite', boxShadow: `0 0 8px ${C.green}` }} />
          <div>
            <div style={{ fontSize: 13, fontWeight: 600, color: C.green, fontFamily: 'JetBrains Mono, monospace' }}>All 18 theorems verified · lake build exit 0 · 3298 jobs</div>
            <div style={{ fontSize: 10, color: C.textSec, marginTop: 2 }}>Build time: 4m 12s · Last run: today 14:08 UTC</div>
          </div>
        </div>
      </Card>
      {THEOREMS.map(t => (
        <div key={t.id} style={{ marginBottom: 8 }}>
          <div onClick={() => setExpanded(expanded === t.id ? null : t.id)}
            style={{ background: C.s2, border: `1px solid ${C.border}`, borderRadius: expanded === t.id ? '8px 8px 0 0' : 8, padding: '12px 16px', cursor: 'pointer', display: 'flex', justifyContent: 'space-between', alignItems: 'center', transition: 'all 0.15s' }}>
            <div style={{ flex: 1 }}>
              <div style={{ display: 'flex', alignItems: 'center', gap: 10, marginBottom: 3 }}>
                <span style={{ fontSize: 10, color: C.textMut, fontFamily: 'JetBrains Mono, monospace' }}>T{String(t.id).padStart(2, '0')}</span>
                <span style={{ fontSize: 12, fontWeight: 600, color: C.text, fontFamily: 'JetBrains Mono, monospace' }}>{t.name}</span>
              </div>
              <div style={{ fontSize: 11, color: C.textSec }}>{t.desc}</div>
            </div>
            <div style={{ display: 'flex', gap: 10, alignItems: 'center', flexShrink: 0, marginLeft: 14 }}>
              <span style={{ fontSize: 9, color: C.textMut, fontFamily: 'JetBrains Mono, monospace' }}>{t.jobs} jobs</span>
              <span style={{ width: 8, height: 8, borderRadius: '50%', background: C.green, display: 'inline-block', boxShadow: `0 0 6px ${C.green}` }} />
            </div>
          </div>
          {expanded === t.id && (
            <div style={{ background: C.bg, border: `1px solid ${C.border}`, borderTop: 'none', borderRadius: '0 0 8px 8px', padding: '14px 16px', animation: 'fadeIn 0.2s ease' }}>
              <div style={{ fontSize: 9, color: C.textMut, fontFamily: 'JetBrains Mono, monospace', marginBottom: 6 }}>FILE: {t.file}</div>
              <MonoBlock>{t.lean}</MonoBlock>
            </div>
          )}
        </div>
      ))}
    </div>
  );
}

// ── App ───────────────────────────────────────────────────────────────────────
function App() {
  const [page, setPage] = useState('contracts');
  const voiceRef = useRef(true);
  const [voiceEnabled, setVoiceState] = useState(true);
  const setVoiceEnabled = v => { voiceRef.current = v; setVoiceState(v); };

  const speak = (text, delay = 300) => {
    setTimeout(() => {
      if (!voiceRef.current) return;
      window.speechSynthesis.cancel();
      const u = new SpeechSynthesisUtterance(text);
      u.rate = 0.92; u.pitch = 1.0; u.volume = 1;
      window.speechSynthesis.speak(u);
    }, delay);
  };

  useEffect(() => { speak(NARRATION[page] || ''); }, [page]);

  return (
    <div style={{ display: 'flex', minHeight: '100vh', background: C.bg }}>
      <Sidebar page={page} setPage={setPage} />
      <main style={{ flex: 1, padding: '32px 36px', overflowY: 'auto', minHeight: '100vh', position: 'relative' }}>
        <button onClick={() => {
          const next = !voiceEnabled; setVoiceEnabled(next);
          if (!next) window.speechSynthesis.cancel();
          else { const u = new SpeechSynthesisUtterance('Voice narration enabled.'); u.rate = 0.92; window.speechSynthesis.speak(u); }
        }} style={{ position: 'fixed', top: 20, right: 24, zIndex: 100, background: voiceEnabled ? `${C.blue}22` : `${C.textMut}18`, border: `1px solid ${voiceEnabled ? C.blue + '55' : C.border}`, borderRadius: 8, padding: '7px 13px', color: voiceEnabled ? C.blue : C.textMut, fontFamily: 'Space Grotesk, sans-serif', fontSize: 11, fontWeight: 600, cursor: 'pointer', display: 'flex', alignItems: 'center', gap: 7, transition: 'all 0.2s' }}>
          <span style={{ fontSize: 14 }}>{voiceEnabled ? '🔊' : '🔇'}</span>
          {voiceEnabled ? 'Voice On' : 'Voice Off'}
        </button>
        {page === 'contracts'    && <AgentContractsPage />}
        {page === 'define'       && <DefineAgentPage />}
        {page === 'verification' && <VerificationPage />}
        {page === 'trace'        && <ExecutionTracePage />}
        {page === 'infoflow'     && <InfoFlowPage />}
        {page === 'safetylog'    && <SafetyLogPage />}
        {page === 'proofs'       && <ProofsPage />}
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
