<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ORBITAL — Mission Risk Intelligence</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #080c14; color: #e2e8f0; font-family: 'Space Grotesk', sans-serif; }
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: #0d1420; }
  ::-webkit-scrollbar-thumb { background: #243347; border-radius: 3px; }
  input[type=range] { height: 4px; }
  select option { background: #111927; }
  @keyframes fadeSlideIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }
  @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
</style>
</head>
<body>
<script type="text/babel" src="orbital-components.jsx"></script>
<script type="text/babel" src="orbital-pages.jsx"></script>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

// ── Voice narration ──────────────────────────────────────────────────────────
const PAGE_NARRATION = {
  setup: "Mission Setup. Enter your mission parameters — target orbit, days to launch, mission phase, and milestone and subsystem health scores across five sliders each. When you're ready, click Run Analysis to deploy all twelve agents.",
  pipeline: "Live Pipeline. Twelve A.I. agents are now being deployed in sequence. Watch each agent's input, decision, and output appear as they complete. The live log on the right tracks all activity in real time.",
  schedule: "Program Schedule. Milestone progress bars are populated from your health slider inputs. Below the bars you'll see delay risk signals flagged by the Schedule Analyser and Vendor Risk Agent, along with cascade dependency mapping.",
  subsystems: "Subsystems. Eight subsystem health cards display current status with colour coding — green for nominal, amber for degraded, red for critical. If thermal is below threshold, the failure cascade path to power and avionics is shown below.",
  launch: "Launch Window. The circular readiness gauge reflects your overall GO status. The checklist below evaluates weather probability, range availability, thermal qualification, propulsion readiness, and orbital clearance. All launch authorisation requires human sign-off — this system provides the risk picture only.",
  orbital: "Orbital Risk. This page summarises conjunction events in the last twenty-four hours, closest approach distance, and estimated collision probability. Maneuver recommendations are provided for human review. No agent in this system can command spacecraft operations.",
  escalations: "Escalations. Open escalations raised by agents are listed by priority — P1 is critical, P2 is serious. Each item shows which agent raised it and who it has been routed to. All approvals require human confirmation. No agent can autonomously resolve an escalation.",
  report: "Executive Report. Auto-generated by the Executive Report Agent after the full pipeline completes. This Public-labelled document summarises mission status, key risks, and recommended actions for senior stakeholders.",
};

const AGENT_NARRATION = (agent) => {
  const starts = {
    'DataIngestionAgent': "Data Ingestion Agent is running. Validating mission payload and confirming all required fields are present.",
    'ScheduleAnalyser': "Schedule Analyser is running. Computing delay risk across all five milestones.",
    'WeatherMonitor': "Weather Monitor is running. Assessing launch window weather probability against thresholds.",
    'OrbitalMechanicsAgent': "Orbital Mechanics Agent is running. Analysing conjunction events and computing collision probability.",
    'SubsystemHealthAgent': "Subsystem Health Agent is running. Scoring all subsystems and identifying degradation patterns.",
    'SubsystemRelationships': "Subsystem Relationships Agent is running. Mapping cross-system dependencies and cascade failure paths.",
    'VendorRiskAgent': "Vendor Risk Agent is running. Assessing vendor delay impact on downstream dependencies.",
    'LaunchWindowAgent': "Launch Window Agent is running. Synthesising weather, orbital clearance, and subsystem status into a window assessment.",
    'RiskAggregatorAgent': "Risk Aggregator Agent is running. Combining all Layer 1 and Layer 2 signals into a unified mission risk score.",
    'EscalationRouterAgent': "Escalation Router Agent is running. Routing flagged risks to the correct human authority.",
    'LaunchReadinessAgent': "Launch Readiness Agent is running. Producing the final readiness assessment for human review.",
    'ExecutiveReportAgent': "Executive Report Agent is running. Generating the Public-labelled executive summary.",
  };
  const completes = {
    'DataIngestionAgent': "Data Ingestion complete. Mission payload validated.",
    'ScheduleAnalyser': "Schedule analysis complete. Risk signals produced.",
    'WeatherMonitor': "Weather assessment complete.",
    'OrbitalMechanicsAgent': "Orbital mechanics analysis complete. Conjunction profile assessed.",
    'SubsystemHealthAgent': "Subsystem health assessment complete.",
    'SubsystemRelationships': "Subsystem relationship analysis complete. Feedback signal sent to Schedule Analyser — runs once and stops.",
    'VendorRiskAgent': "Vendor risk assessment complete.",
    'LaunchWindowAgent': "Launch window analysis complete.",
    'RiskAggregatorAgent': "Risk aggregation complete. Mission risk level determined.",
    'EscalationRouterAgent': "Escalation routing complete. Note: the action auto-approve-launch was blocked by the safety layer.",
    'LaunchReadinessAgent': "Launch readiness assessment complete. Awaiting human authorisation. Note: the action issue-launch-authorisation was blocked by the safety layer.",
    'ExecutiveReportAgent': "Executive report generated. Pipeline complete. All pages are now populated.",
  };
  return { start: starts[agent.name] || `${agent.name} is running.`, complete: completes[agent.name] || `${agent.name} complete.` };
};

const DEFAULT_MISSION = {
  missionName: 'ASTRA-7',
  orbit: 'LEO-550km',
  daysToLaunch: '90',
  phase: 'Integration',
  milestones: [
    { name: 'Systems Integration', value: 72 },
    { name: 'Avionics Test', value: 48 },
    { name: 'Propulsion Integration', value: 85 },
    { name: 'Thermal Qualification', value: 31 },
    { name: 'Launch Rehearsal', value: 65 },
  ],
  subsystems: [
    { name: 'Thermal', value: 38 },
    { name: 'Propulsion', value: 76 },
    { name: 'Power', value: 82 },
    { name: 'Avionics', value: 59 },
    { name: 'Communications', value: 91 },
  ],
  conjunctions: 4,
  closestApproach: 3.2,
  vendorDelay: 8,
  weatherProb: 55,
};

function App() {
  const [page, setPage] = useState('setup');
  const [missionData, setMissionData] = useState(DEFAULT_MISSION);
  const [agents, setAgents] = useState([]);
  const [logLines, setLogLines] = useState([]);
  const [pipelineRunning, setPipelineRunning] = useState(false);
  const [pipelineComplete, setPipelineComplete] = useState(false);
  const logRef = useRef([]);
  const voiceRef = useRef(true);
  const [voiceEnabled, setVoiceEnabledState] = useState(true);

  const setVoiceEnabled = (v) => { voiceRef.current = v; setVoiceEnabledState(v); };

  const speak = useCallback((text, delay = 0) => {
    if (!voiceRef.current) return;
    if (delay) {
      setTimeout(() => {
        if (!voiceRef.current) return;
        window.speechSynthesis.cancel();
        const u = new SpeechSynthesisUtterance(text);
        u.rate = 0.92; u.pitch = 1.0; u.volume = 1;
        window.speechSynthesis.speak(u);
      }, delay);
    } else {
      window.speechSynthesis.cancel();
      const u = new SpeechSynthesisUtterance(text);
      u.rate = 0.92; u.pitch = 1.0; u.volume = 1;
      window.speechSynthesis.speak(u);
    }
  }, []);

  // Narrate on page navigation
  useEffect(() => {
    if (page !== 'pipeline') speak(PAGE_NARRATION[page] || '', 300);
  }, [page]);

  const addLog = (text, color) => {
    const time = new Date().toLocaleTimeString('en-GB', {hour:'2-digit', minute:'2-digit', second:'2-digit'});
    logRef.current = [...logRef.current, { time, text, color }];
    setLogLines([...logRef.current]);
  };

  const runPipeline = () => {
    if (pipelineRunning) return;
    const agentTemplates = AGENTS_TEMPLATE(missionData);
    const initial = agentTemplates.map(a => ({ ...a, status: 'Queued' }));
    setAgents(initial);
    setLogLines([]);
    logRef.current = [];
    setPipelineRunning(true);
    setPipelineComplete(false);
    setPage('pipeline');

    addLog('Pipeline initiated — deploying 12 agents', O_COLORS.blue);
    speak('Pipeline initiated. Deploying all twelve agents now. Each agent will process its inputs and report its decision.', 400);

    agentTemplates.forEach((agent, i) => {
      const narration = AGENT_NARRATION(agent);
      const startMs = i * 900;
      const completeMs = i * 900 + 700;

      // Set to Running
      setTimeout(() => {
        setAgents(prev => prev.map(a => a.id === agent.id ? { ...a, status: 'Running' } : a));
        addLog(`[${agent.name}] started — Layer ${agent.layer}`, O_COLORS.blue);
        speak(narration.start);
      }, startMs);

      // Set to Complete
      setTimeout(() => {
        const status = agent.blockedAction ? 'Escalated' : 'Complete';
        setAgents(prev => prev.map(a => a.id === agent.id ? { ...a, status } : a));
        addLog(
          `[${agent.name}] ${status === 'Escalated' ? 'escalated — blocked action: ' + agent.blockedAction : 'complete — ' + agent.output.slice(0, 50)}`,
          status === 'Escalated' ? O_COLORS.red : O_COLORS.green
        );
        if (i === agentTemplates.length - 1) {
          setTimeout(() => {
            setPipelineRunning(false);
            setPipelineComplete(true);
            addLog('▶ All agents complete. Risk picture ready.', O_COLORS.cyan);
            speak('Pipeline complete. All twelve agents have finished. The full risk picture is now available. Use the sidebar to explore Program Schedule, Subsystems, Launch Window, Orbital Risk, Escalations, and the Executive Report.');
          }, 500);
        }
      }, completeMs);
    });
  };

  return (
    <div style={{ display: 'flex', minHeight: '100vh', background: O_COLORS.bg }}>
      <OrbitalSidebar page={page} setPage={setPage} pipelineComplete={pipelineComplete} missionName={pipelineComplete ? missionData.missionName : null} />
      <main style={{ flex: 1, padding: '32px 36px', overflowY: 'auto', minHeight: '100vh', position: 'relative' }}>
        {/* Voice toggle */}
        <button
          onClick={() => {
            const next = !voiceEnabled;
            setVoiceEnabled(next);
            if (!next) window.speechSynthesis.cancel();
            else { const u = new SpeechSynthesisUtterance('Voice narration enabled.'); u.rate = 0.92; window.speechSynthesis.speak(u); }
          }}
          title={voiceEnabled ? 'Mute narration' : 'Enable narration'}
          style={{
            position: 'fixed', top: 20, right: 24, zIndex: 100,
            background: voiceEnabled ? `${O_COLORS.blue}22` : `${O_COLORS.textMut}18`,
            border: `1px solid ${voiceEnabled ? O_COLORS.blue + '55' : O_COLORS.border}`,
            borderRadius: 8, padding: '7px 13px',
            color: voiceEnabled ? O_COLORS.blue : O_COLORS.textMut,
            fontFamily: 'Space Grotesk, sans-serif', fontSize: 11, fontWeight: 600,
            cursor: 'pointer', display: 'flex', alignItems: 'center', gap: 7,
            transition: 'all 0.2s',
          }}
        >
          <span style={{ fontSize: 14 }}>{voiceEnabled ? '🔊' : '🔇'}</span>
          {voiceEnabled ? 'Voice On' : 'Voice Off'}
        </button>

        {page === 'setup' && <MissionSetupPage data={missionData} setData={setMissionData} onRun={runPipeline} />}
        {page === 'pipeline' && <LivePipelinePage agents={agents} logLines={logLines} />}
        {page === 'schedule' && <ProgramSchedulePage data={missionData} agents={agents} />}
        {page === 'subsystems' && <SubsystemsPage data={missionData} />}
        {page === 'launch' && <LaunchWindowPage data={missionData} />}
        {page === 'orbital' && <OrbitalRiskPage data={missionData} />}
        {page === 'escalations' && <EscalationsPage data={missionData} agents={agents} />}
        {page === 'report' && <ExecutiveReportPage data={missionData} agents={agents} />}
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
<div id="root"></div>
</body>
</html>
